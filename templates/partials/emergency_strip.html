{% load site_extras %}
<div class="emergency-strip">
  <div class="wrapper emergency-strip__inner">
    <span class="top-location">
      {% if site.google_maps_url %}
        <a href="{{ site.google_maps_url }}" target="_blank" rel="noopener">{{ site.address|default:"Ajnala Road, Fatehgarh Churian" }}</a>
      {% else %}
        {{ site.address|default:"Ajnala Road, Fatehgarh Churian" }}
      {% endif %}
    </span>
    <span class="top-motto"><span class="punjabi-support">ਸੇਵਾ ਹੀ ਸਾਡਾ ਧਰਮ</span><span aria-hidden="true">|</span> Service is Our Duty</span>
  </div>
</div>
