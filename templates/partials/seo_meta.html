{% load static %}
<title>{{ seo.title|default:"Bibi Kaulan Ji Hospital" }}</title>
<meta name="description" content="{{ seo.description|default:'Bibi Kaulan Ji Hospital provides OPD consultation, emergency support, ambulance assistance, departments, doctors, and appointment request information.' }}">
<meta name="robots" content="{{ seo.robots|default:'index,follow' }}">
<link rel="canonical" href="{{ canonical_origin }}{{ seo.canonical_path|default:request.path }}">
<meta property="og:title" content="{{ seo.title|default:'Bibi Kaulan Ji Hospital' }}">
<meta property="og:description" content="{{ seo.description|default:'Find doctors, departments, OPD timing, emergency support, ambulance contact, and appointment information.' }}">
<meta property="og:url" content="{{ canonical_origin }}{{ seo.canonical_path|default:request.path }}">
<meta property="og:type" content="website">
{% if seo.og_image_url %}
<meta property="og:image" content="{{ seo.og_image_url }}">
{% else %}
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static seo.og_image|default:'images/og/default-hospital.svg' %}">
{% endif %}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ seo.title|default:'Bibi Kaulan Ji Hospital' }}">
<meta name="twitter:description" content="{{ seo.description|default:'Find doctors, departments, OPD timing, emergency support, ambulance contact, and appointment information.' }}">
